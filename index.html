<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="User controls">
        <div class="title-group">
          <p class="kicker">بيانات المستخدمين</p>
          <h1>المستخدمون</h1>
        </div>

        <div class="actions">
          <label class="search-box">
            <span>بحث</span>
            <input id="searchInput" type="search" placeholder="اسم، هاتف، نشاط، مفتاح..." autocomplete="off" />
          </label>

          <label class="select-box">
            <span>نوع الحساب</span>
            <select id="accountFilter">
              <option value="all">الكل</option>
              <option value="buyer">مشتري</option>
              <option value="merchant">تاجر</option>
              <option value="delivery">توصيل</option>
              <option value="admin">إدارة</option>
            </select>
          </label>

          <button id="refreshButton" class="icon-button" type="button" title="تحديث البيانات" aria-label="تحديث البيانات">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15.2 6.5M3 12A9 9 0 0 1 18.2 5.5" />
              <path d="M21 3v6h-6M3 21v-6h6" />
            </svg>
          </button>
        </div>
      </section>

      <section class="summary-grid" aria-label="Summary stats">
        <div class="stat-card">
          <span>المستخدمون</span>
          <strong id="usersCount">0</strong>
        </div>
        <div class="stat-card">
          <span>جهات الاتصال</span>
          <strong id="contactsCount">0</strong>
        </div>
        <div class="stat-card">
          <span>توكينات</span>
          <strong id="tokensCount">0</strong>
        </div>
        <div class="stat-card">
          <span>التخصصات</span>
          <strong id="specialtiesCount">0</strong>
        </div>
      </section>

      <section class="table-panel" aria-label="Users table">
        <div class="table-header">
          <div class="status-line">
            <span id="statusText">جاهز للتحميل</span>
            <span id="visibleCount">0 ظاهر</span>
          </div>
        </div>

        <div class="table-wrapper">
          <table class="users-table">
            <thead>
              <tr>
                <th>المستخدم</th>
                <th>الهاتف</th>
                <th>النشاط</th>
                <th>التصنيف</th>
                <th>جهات الاتصال</th>
                <th>التخصصات</th>
                <th>إجراءات</th>
              </tr>
            </thead>
            <tbody id="usersTable"></tbody>
          </table>
        </div>
      </section>

      <section class="details-panel" aria-label="User details">
        <div id="emptyDetails" class="empty-state-panel">
          <strong>اختر مستخدمًا لعرض التفاصيل</strong>
        </div>
        <div id="userDetails" class="details-card" hidden></div>
      </section>
    </main>

    <script src="./src/app.js" defer></script>
  </body>
</html>
